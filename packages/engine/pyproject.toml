[project]
name = "reporelay-engine"
version = "0.0.0"
description = "RepoRelay recommendation engine — blended strategies with dynamic thresholds"
requires-python = ">=3.12"

dependencies = [
    "reporelay-core",
    "pydantic>=2.8.0",
    "numpy>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/reporelay_engine"]
