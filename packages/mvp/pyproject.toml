[project]
name = "reporelay-mvp"
version = "0.1.0"
description = "RepoRelay MVP — minimal 5-stage recommender (data, features, candidates, score, rerank)"
requires-python = ">=3.12"

dependencies = [
    "pydantic>=2.8.0",
    "pydantic-settings>=2.4.0",
    "sqlalchemy[asyncio]>=2.0.30",
    "psycopg[binary]>=3.2.0",
    "alembic>=1.13.0",
    "httpx>=0.27.0",
    "tenacity>=9.0.0",
    "typer>=0.12.0",
    "rich>=13.8.0",
    "numpy>=2.0.0",
    "selectolax>=0.3.21",
]

[project.optional-dependencies]
embed = [
    "sentence-transformers>=3.0.0",
]

[project.scripts]
reporelay-mvp = "reporelay_mvp.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/reporelay_mvp"]

[tool.hatch.build.targets.wheel.force-include]
"src/reporelay_mvp/py.typed" = "reporelay_mvp/py.typed"
