[project]
name = "reporelay-ingest"
version = "0.0.0"
description = "GitHub and registry ingestion for RepoRelay"
requires-python = ">=3.12"

dependencies = [
    "reporelay-core",
    "httpx>=0.27.0",
    "typer>=0.12.0",
    "rich>=13.8.0",
    "tenacity>=9.0.0",
]

[project.scripts]
reporelay-ingest = "reporelay_ingest.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/reporelay_ingest"]
