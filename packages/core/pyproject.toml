[project]
name = "reporelay-core"
version = "0.0.0"
description = "Shared settings, db connection, and schemas for RepoRelay"
requires-python = ">=3.12"

dependencies = [
    "pydantic>=2.8.0",
    "pydantic-settings>=2.4.0",
    "sqlalchemy[asyncio]>=2.0.30",
    "psycopg[binary]>=3.2.0",
    "alembic>=1.13.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/reporelay_core"]
