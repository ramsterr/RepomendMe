name: keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: |
          # /health + /popular keep the container warm.
          # /recommend?tags=... actually loads the embedding model into RAM,
          # so it's warm and ready when real users arrive.
          curl -sf -o /dev/null https://reporelay-mvp-api-0w1k.onrender.com/health
          curl -sf -o /dev/null https://reporelay-mvp-api-0w1k.onrender.com/popular?limit=1
          curl -sf -o /dev/null "https://reporelay-mvp-api-0w1k.onrender.com/recommend?repo=fastapi/fastapi&limit=1&tags=python"
