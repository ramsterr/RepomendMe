name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Sync
        run: uv sync --all-extras
      - name: Lint
        run: uv run ruff check .
      - name: Typecheck
        run: uv run mypy apps packages
      - name: Test
        run: uv run pytest

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm -r exec biome check .
      - name: Typecheck
        run: pnpm --filter reporelay-site astro check
