name: embed

on:
  schedule:
    # every hour at :30 (offset from seed which runs at :00)
    - cron: "30 * * * *"
  workflow_dispatch:

jobs:
  embed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        run: uv sync --frozen --extra embed

      - name: Run embedder
        run: uv run --package reporelay-mvp reporelay-mvp embed --limit 500 --concurrency 4
